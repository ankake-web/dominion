# ============================================================
# render.yaml — オンライン対戦サーバ（WebSocket）の Render デプロイ定義
# ============================================================
#
# このファイルは「対戦サーバ」だけをデプロイする（フロントは GitHub Pages 配信）。
# Render ダッシュボードの Blueprint からこのリポジトリを指すと自動で読み込まれる。
#
# 仕組み:
#   - Node の Web Service として起動（npm start = node server/index.js）。
#   - Render が注入する PORT で listen し、パス /ws で WebSocket を待ち受ける。
#   - ヘルスチェックは GET /health（server/index.js が 200 を返す）。
#   - buildCommand は --omit=dev で本番依存(ws)だけ入れる（puppeteer等は入れない）。
#
# デプロイ後にやること（ダッシュボード側）:
#   1. ALLOWED_ORIGINS に GitHub Pages のオリジンを設定（例 https://<user>.github.io）。
#      ※ スキーム+ホストのみ。パス（/dominion）は含めない。
#   2. 払い出された公開 URL（https://dominion-xxxx.onrender.com）を控える。
#      → フロントの js/net.js の PROD_SERVER_URL に wss:// 形で貼り替える。

services:
  - type: web
    name: dominion-server
    runtime: node
    plan: free                       # 無料枠（無アクセスでスリープ→初回アクセスで復帰）
    buildCommand: npm ci --omit=dev   # 本番依存(ws)のみ。puppeteer/jsdomは入れない
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      # 接続を許可する Origin（カンマ区切り）。本番は GitHub Pages のオリジンを設定。
      # 例: https://<github-user>.github.io
      - key: ALLOWED_ORIGINS
        sync: false                  # 値はダッシュボードで設定（コミットしない）
      - key: NODE_VERSION
        value: "20"
