name: Deploy to GitHub Pages

# main に push されるたびに、静的フロント（index.html / js / css / assets の軽量JPEG）を
# GitHub Pages へ公開する。ビルド工程は無し（バニラJSのためそのまま配信）。
# 手動実行も可能（Actions タブの "Run workflow"）。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 公開に必要なファイルだけを _site にまとめる（原本PNG等の重いものは除外）。
      - name: Assemble site
        run: |
          mkdir -p _site/css _site/js _site/asset _site/asset/thumb _site/asset/cards
          cp index.html cards.html manifest.webmanifest favicon.svg sw.js _site/
          cp icon-180.png icon-192.png icon-512.png _site/
          cp css/*.css _site/css/
          cp js/*.js _site/js/
          cp asset/*.jpg _site/asset/
          cp asset/thumb/*.jpg _site/asset/thumb/ 2>/dev/null || true
          # cards.html の完成カード（軽量 WebP・合計約11MB）
          cp asset/cards/*.webp _site/asset/cards/ 2>/dev/null || true
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
