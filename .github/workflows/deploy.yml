name: Deploy to GitHub Pages

# main に push されるたびに、静的フロント（index.html / js / css / assets の軽量JPEG）を
# GitHub Pages へ公開する。ビルド工程は無し（バニラJSのためそのまま配信）。
# 手動実行も可能（Actions タブの "Run workflow"）。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 公開に必要なファイルだけを _site にまとめる（原本PNG等の重いものは除外）。
      - name: Assemble site
        run: |
          mkdir -p _site/css _site/js _site/assets _site/assets/art _site/data
          cp index.html cards.html manifest.webmanifest favicon.svg _site/
          cp css/*.css _site/css/
          cp js/*.js _site/js/
          cp data/cards.json _site/data/
          cp assets/*.jpg _site/assets/
          cp assets/art/*.jpg _site/assets/art/ 2>/dev/null || true
          cp favicon.svg _site/assets/ 2>/dev/null || true
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
